<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI QA Agent - 3D Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
            overflow: hidden;
            height: 100vh;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-element {
            position: absolute;
            pointer-events: auto;
        }

        .corner-glow {
            position: fixed;
            z-index: 1;
        }

        .corner-glow-top-left {
            top: -50%;
            left: -50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .corner-glow-bottom-right {
            bottom: -50%;
            right: -50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .panel-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .title-3d {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
        }

        .control-panel {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            background: rgba(10, 14, 39, 0.9);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 30px;
            width: 400px;
            max-height: 600px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0, 255, 136, 0.1);
            overflow-y: auto;
        }

        .control-panel input,
        .control-panel textarea,
        .control-panel button {
            font-family: 'Courier New', monospace;
            background: rgba(26, 31, 58, 0.9);
            border: 1px solid #0099ff;
            color: #00ff88;
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .control-panel input:focus,
        .control-panel textarea:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .control-panel button {
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            border: 2px solid #00ff88;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 153, 255, 0.1));
            transition: all 0.3s ease;
        }

        .control-panel button:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 153, 255, 0.3));
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }

        .control-panel button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .button-group button {
            margin: 0;
        }

        .terminal-panel {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 100;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #0099ff;
            border-radius: 10px;
            padding: 20px;
            width: 500px;
            height: 400px;
            box-shadow: 0 0 30px rgba(0, 153, 255, 0.3), inset 0 0 20px rgba(0, 153, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            color: #0099ff;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0099ff;
            border-bottom: 1px solid #0099ff;
            padding-bottom: 10px;
        }

        .terminal-content {
            flex: 1;
            overflow-y: auto;
            color: #00ff88;
            font-size: 11px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .terminal-content::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-content::-webkit-scrollbar-track {
            background: rgba(0, 255, 136, 0.1);
        }

        .terminal-content::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }

        .result-panel {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 100;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #ff00ff;
            border-radius: 10px;
            padding: 20px;
            width: 350px;
            max-height: 500px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
            overflow-y: auto;
            display: none;
        }

        .result-panel.active {
            display: block;
        }

        .result-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .result-badge.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .result-badge.failed {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        .screenshot-container {
            margin-top: 15px;
            border: 1px solid #ff00ff;
            border-radius: 5px;
            overflow: hidden;
            max-width: 100%;
        }

        .screenshot-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #00ff88;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .glitch {
            position: relative;
            color: #00ff88;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            color: #0099ff;
            z-index: -1;
        }

        .glitch::after {
            animation: glitch 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse infinite;
            color: #ff00ff;
            z-index: -2;
        }

        @keyframes glitch {
            0% { clip-path: inset(40% 0 61% 0); transform: translate(-2px, -2px); }
            20% { clip-path: inset(92% 0 1% 0); transform: translate(2px, 2px); }
            40% { clip-path: inset(43% 0 1% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(25% 0 58% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(54% 0 7% 0); transform: translate(-2px, -2px); }
            100% { clip-path: inset(58% 0 43% 0); transform: translate(2px, 2px); }
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-indicator.idle {
            background: #0099ff;
        }

        .status-indicator.running {
            background: #ffff00;
        }

        .status-indicator.success {
            background: #00ff00;
        }

        .status-indicator.error {
            background: #ff0000;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .plan-panel {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 20px;
            width: 400px;
            max-height: 450px;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.3);
            display: none;
            flex-direction: column;
        }

        .plan-panel.active {
            display: flex;
        }

        .plan-header {
            color: #ffaa00;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffaa00;
            border-bottom: 1px solid #ffaa00;
            padding-bottom: 10px;
        }

        .plan-content {
            flex: 1;
            overflow-y: auto;
            color: #ffaa00;
            font-size: 11px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .plan-content::-webkit-scrollbar {
            width: 8px;
        }

        .plan-content::-webkit-scrollbar-track {
            background: rgba(255, 170, 0, 0.1);
        }

        .plan-content::-webkit-scrollbar-thumb {
            background: #ffaa00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Background Corner Glows -->
    <div class="corner-glow corner-glow-top-left"></div>
    <div class="corner-glow corner-glow-bottom-right"></div>

    <!-- Three.js Canvas -->
    <canvas id="canvas"></canvas>

    <!-- HUD Overlay -->
    <div class="hud">
        <!-- Title Panel -->
        <div class="panel-overlay">
            <div class="glitch" data-text="AUTONOMOUS QA AGENT">
                AUTONOMOUS QA AGENT
            </div>
            <div style="font-size: 10px; margin-top: 5px; color: #0099ff;">v3.0 | 3D CYBERPUNK INTERFACE</div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <form id="runForm">
                <div style="color: #00ff88; font-size: 11px; margin-bottom: 15px; letter-spacing: 1px;">
                    ▶ TARGET CONFIGURATION
                </div>
                
                <input type="url" id="url" placeholder="Target URL" required value="https://www.saucedemo.com/" />
                
                <div style="color: #00ff88; font-size: 11px; margin: 15px 0 5px 0; letter-spacing: 1px;">
                    ▶ TESTING OBJECTIVE
                </div>
                
                <textarea id="goal" placeholder="Enter your testing goal..." required rows="5">Login to the application using username 'standard_user' and password 'secret_sauce'. Then, click 'Add to cart' on the first item (Backpack). After that, verify the cart icon in the top right shows a badge with '1'. When you verify it says '1', mark the test as done.</textarea>
                
                <div class="button-group">
                    <button type="button" id="generateBtn">
                        <span class="status-indicator idle"></span>GENERATE PLAN
                    </button>
                    <button type="submit" id="runBtn" disabled>
                        <span class="status-indicator idle"></span>EXECUTE TEST
                    </button>
                </div>
            </form>
        </div>

        <!-- Terminal Panel -->
        <div class="terminal-panel">
            <div class="terminal-header">
                <span class="status-indicator idle"></span>EXECUTION LOG
            </div>
            <div class="terminal-content" id="terminal">
                System online... Awaiting commands.
            </div>
        </div>

        <!-- Test Plan Panel -->
        <div class="plan-panel" id="planPanel">
            <div class="plan-header">
                <span class="status-indicator idle"></span>TEST PLAN (EDITABLE)
            </div>
            <textarea id="testPlan" class="plan-content" placeholder="Test plan will appear here..."></textarea>
        </div>

        <!-- Result Panel -->
        <div class="result-panel" id="resultPanel">
            <div style="color: #ff00ff; font-size: 11px; margin-bottom: 15px; letter-spacing: 1px;">
                ▶ TEST RESULT
            </div>
            <div id="resultBadge" class="result-badge"></div>
            <p id="resultMessage" style="color: #ff00ff; font-size: 11px; line-height: 1.5;"></p>
            <div class="screenshot-container" id="screenshotContainer"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ============ THREE.JS 3D SCENE ============
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0e27, 1);
        camera.position.z = 5;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0x00ff88, 0.8);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x0099ff, 0.5);
        pointLight.position.set(-5, -5, 5);
        scene.add(pointLight);

        // Create 3D Background Cubes (Animated)
        const geometries = [];
        for (let i = 0; i < 15; i++) {
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshStandardMaterial({
                color: Math.random() > 0.5 ? 0x00ff88 : 0x0099ff,
                metalness: 0.7,
                roughness: 0.2,
                emissive: Math.random() > 0.5 ? 0x00ff88 : 0x0099ff,
                emissiveIntensity: 0.3
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            mesh.velocity = {
                x: (Math.random() - 0.5) * 0.01,
                y: (Math.random() - 0.5) * 0.01,
                z: (Math.random() - 0.5) * 0.01
            };
            scene.add(mesh);
            geometries.push(mesh);
        }

        // Create wireframe grid background
        const gridGeometry = new THREE.BufferGeometry();
        const gridSize = 50;
        const gridDivisions = 10;
        const points = [];

        for (let i = 0; i <= gridDivisions; i++) {
            for (let j = 0; j <= gridDivisions; j++) {
                const x = (i / gridDivisions - 0.5) * gridSize;
                const y = (j / gridDivisions - 0.5) * gridSize;
                points.push(x, y, -10);
            }
        }

        gridGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(points), 3));
        const gridMaterial = new THREE.PointsMaterial({ color: 0x00ff88, size: 0.1, opacity: 0.3 });
        const gridPoints = new THREE.Points(gridGeometry, gridMaterial);
        scene.add(gridPoints);

        // Mouse tracking for parallax effect
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate and move cubes
            geometries.forEach(mesh => {
                mesh.rotation.x += mesh.velocity.x;
                mesh.rotation.y += mesh.velocity.y;
                mesh.position.x += mesh.velocity.x * 0.5;
                mesh.position.y += mesh.velocity.y * 0.5;

                // Wrap around
                if (Math.abs(mesh.position.x) > 15) mesh.position.x *= -0.9;
                if (Math.abs(mesh.position.y) > 15) mesh.position.y *= -0.9;
            });

            // Camera parallax follow mouse
            camera.position.x = mouseX * 0.5;
            camera.position.y = mouseY * 0.5;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============ UI LOGIC ============
        const form = document.getElementById('runForm');
        const generateBtn = document.getElementById('generateBtn');
        const runBtn = document.getElementById('runBtn');
        const terminal = document.getElementById('terminal');
        const planPanel = document.getElementById('planPanel');
        const testPlanInput = document.getElementById('testPlan');
        const resultPanel = document.getElementById('resultPanel');
        const resultBadge = document.getElementById('resultBadge');
        const resultMessage = document.getElementById('resultMessage');
        const screenshotContainer = document.getElementById('screenshotContainer');

        function updateTerminal(msg) {
            terminal.innerHTML += msg + '\n';
            terminal.scrollTop = terminal.scrollHeight;
        }

        generateBtn.addEventListener('click', async () => {
            const url = document.getElementById('url').value;
            const goal = document.getElementById('goal').value;

            generateBtn.disabled = true;
            generateBtn.querySelector('.status-indicator').className = 'status-indicator running';
            terminal.innerHTML = '[SYSTEM] Generating test plan...\n';
            planPanel.classList.remove('active');

            try {
                const response = await fetch('/api/generate-plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, goal })
                });

                const data = await response.json();

                if (response.ok) {
                    testPlanInput.value = data.plan;
                    planPanel.classList.add('active');
                    updateTerminal('[SUCCESS] Test plan generated! Review and edit on the left panel.');
                    runBtn.disabled = false;
                    runBtn.querySelector('.status-indicator').className = 'status-indicator idle';
                } else {
                    updateTerminal(`[ERROR] Failed to generate plan: ${data.error}`);
                }
            } catch (err) {
                updateTerminal(`[ERROR] Connection failed: ${err.message}`);
            } finally {
                generateBtn.disabled = false;
                generateBtn.querySelector('.status-indicator').className = 'status-indicator idle';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (runBtn.disabled) return;

            const url = document.getElementById('url').value;
            const goal = document.getElementById('goal').value;
            const testPlan = testPlanInput.value;

            runBtn.disabled = true;
            runBtn.querySelector('.status-indicator').className = 'status-indicator running';
            generateBtn.disabled = true;
            resultPanel.classList.remove('active');
            terminal.innerHTML = '[SYSTEM] Initializing browser execution...\n[SYSTEM] Watch your local machine for the Playwright browser!\n\n';

            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, goal, testPlan })
                });

                const data = await response.json();

                terminal.innerHTML = '';
                data.logs.forEach(log => {
                    updateTerminal(log);
                });

                // Display Result
                resultPanel.classList.add('active');

                if (data.success) {
                    resultBadge.innerHTML = '✓ TEST PASSED';
                    resultBadge.className = 'result-badge success';
                } else {
                    resultBadge.innerHTML = '✗ TEST FAILED';
                    resultBadge.className = 'result-badge failed';
                }

                resultMessage.textContent = data.message || 'Test execution complete.';

                if (data.screenshot) {
                    screenshotContainer.innerHTML = `<img src="data:image/png;base64,${data.screenshot}" />`;
                }

                runBtn.querySelector('.status-indicator').className = 'status-indicator success';

            } catch (err) {
                updateTerminal(`[ERROR] Execution failed: ${err.message}`);
                runBtn.querySelector('.status-indicator').className = 'status-indicator error';
            } finally {
                runBtn.disabled = false;
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
