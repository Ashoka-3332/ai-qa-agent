<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous QA Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f1f5f9; /* Slate 100 */
        }
        
        .terminal {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e293b;
            color: #10b981; /* Emerald 500 */
        }
        
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">
    <div class="max-w-6xl w-full flex flex-col gap-6">
        
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                AI Autonomous QA Agent
            </h1>
            <p class="text-slate-400 mt-2">Describe a goal in plain English, and the AI will interact with the browser to achieve it.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Controls Form -->
            <div class="col-span-1 bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700">
                <form id="runForm" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Target URL</label>
                        <input type="url" id="url" required value="https://www.saucedemo.com/" class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none text-slate-100">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Testing Goal</label>
                        <textarea id="goal" required rows="6" class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none text-slate-100 resize-none">Login to the application using username 'standard_user' and password 'secret_sauce'. Then, click 'Add to cart' on the first item (Backpack). After that, verify the cart icon in the top right shows a badge with '1'. When you verify it says '1', mark the test as done.</textarea>
                    </div>
                    <div class="flex gap-2">
                        <button type="button" id="generateBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 transition-colors text-white font-semibold py-2 rounded flex justify-center items-center gap-2">
                            <span>1. Generate Test Plan</span>
                        </button>
                        <button type="submit" id="runBtn" disabled class="flex-1 bg-blue-600 hover:bg-blue-500 transition-colors text-white font-semibold py-2 rounded flex justify-center items-center gap-2 opacity-50 cursor-not-allowed">
                            <span>2. Run Test Plan</span>
                        </button>
                    </div>
                    
                    <div id="planContainer" class="hidden flex flex-col mt-4">
                        <label class="block text-sm font-medium mb-1 text-emerald-400">Generated Test Plan (Edit before running)</label>
                        <textarea id="testPlan" rows="6" class="w-full bg-slate-900 border border-emerald-700/50 rounded p-2 focus:ring-2 focus:ring-emerald-500 outline-none text-emerald-100 resize-none font-mono text-sm shadow-inner"></textarea>
                    </div>

                    <div id="status" class="hidden flex justify-center items-center gap-2 text-blue-400 mt-2">
                        <div class="loader"></div>
                        <span>Agent is thinking & acting...</span>
                    </div>
                </form>
            </div>

            <!-- Terminal and Results View -->
            <div class="col-span-1 lg:col-span-2 flex flex-col gap-6">
                <!-- Terminal Log -->
                <div class="bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700 flex flex-col flex-grow min-h-[300px]">
                    <h3 class="text-lg font-semibold mb-2 border-b border-slate-700 pb-2">Execution Log</h3>
                    <div id="terminal" class="terminal flex-grow p-4 rounded overflow-y-auto max-h-[400px] text-sm whitespace-pre-wrap">
                        Ready to start testing...
                    </div>
                </div>

                <!-- Final Screenshot -->
                <div id="resultContainer" class="hidden bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold">Final Result</h3>
                        <span id="badge" class="px-3 py-1 rounded text-sm font-bold"></span>
                    </div>
                    <p id="resultMessage" class="text-slate-300 mb-4"></p>
                    <div class="w-full border border-slate-700 rounded overflow-hidden">
                        <img id="screenshot" src="" alt="Final Browser State" class="w-full h-auto object-contain">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('runForm');
        const generateBtn = document.getElementById('generateBtn');
        const runBtn = document.getElementById('runBtn');
        const statusDiv = document.getElementById('status');
        const terminal = document.getElementById('terminal');
        const resultContainer = document.getElementById('resultContainer');
        const screenshot = document.getElementById('screenshot');
        const badge = document.getElementById('badge');
        const resultMessage = document.getElementById('resultMessage');
        const planContainer = document.getElementById('planContainer');
        const testPlanInput = document.getElementById('testPlan');

        generateBtn.addEventListener('click', async () => {
            const url = document.getElementById('url').value;
            const goal = document.getElementById('goal').value;
            
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="loader w-4 h-4"></div> Generating...';
            terminal.innerHTML = '<span class="text-slate-400">[System] Generating step-by-step test plan using LLM...</span>\n';
            planContainer.classList.add('hidden');
            
            try {
                const response = await fetch('/api/generate-plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, goal })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    testPlanInput.value = data.plan;
                    planContainer.classList.remove('hidden');
                    terminal.innerHTML += '<span class="text-emerald-400">[System] Test plan generated successfully! You can review and edit it on the left before executing.</span>\n';
                    
                    // Enable the run button
                    runBtn.disabled = false;
                    runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    terminal.innerHTML += `\n<span class="text-red-500 font-bold">[Error] Failed to generate plan: ${data.error}</span>`;
                }
            } catch (err) {
                terminal.innerHTML += `\n<span class="text-red-500 font-bold">[Error] Connection failed: ${err.message}</span>`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<span>1. Generate Test Plan</span>';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (runBtn.disabled) return;
            
            const url = document.getElementById('url').value;
            const goal = document.getElementById('goal').value;
            const testPlan = document.getElementById('testPlan').value;

            // UI Reset
            runBtn.disabled = true;
            runBtn.classList.add('opacity-50', 'cursor-not-allowed');
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = '<div class="loader w-4 h-4"></div> <span class="text-sm">Agent is executing plan...</span>';
            resultContainer.classList.add('hidden');
            terminal.innerHTML = '<span class="text-slate-400">[System] Initializing browser for execution...</span>\n';

            try {
                // Warning to user that this takes time (since they'll see the browser pop up if running locally)
                terminal.innerHTML += '<span class="text-slate-400">[System] Watch your local machine for the Playwright browser window! The API call will hold until the agent finishes.</span>\n\n';

                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, goal, testPlan })
                });

                const data = await response.json();

                if (response.ok) {
                    // Render Logs
                    terminal.innerHTML = '';
                    data.logs.forEach(log => {
                        let colorClass = 'text-emerald-400'; // Default text color
                        if (log.includes('🤔 Thought:')) colorClass = 'text-blue-300';
                        if (log.includes('🎬 Action:')) colorClass = 'text-yellow-300';
                        if (log.includes('❌')) colorClass = 'text-red-400 font-bold';
                        if (log.includes('✅')) colorClass = 'text-green-400 font-bold';
                        if (log.includes('--- Step')) colorClass = 'text-slate-400 mt-4 block';
                        
                        terminal.innerHTML += `<span class="${colorClass}">${log}</span>\n`;
                    });

                    // Scroll to bottom
                    terminal.scrollTop = terminal.scrollHeight;

                    // Render Screenshot and Badge
                    resultContainer.classList.remove('hidden');
                    
                    if (data.success) {
                        badge.textContent = "PASSED";
                        badge.className = "px-3 py-1 rounded text-sm font-bold bg-green-500/20 text-green-400 border border-green-500/50";
                    } else {
                        badge.textContent = "FAILED";
                        badge.className = "px-3 py-1 rounded text-sm font-bold bg-red-500/20 text-red-400 border border-red-500/50";
                    }

                    resultMessage.textContent = data.message || (data.success ? "Agent successfully completed the goal." : "Agent failed or timed out.");

                    if (data.screenshot) {
                        screenshot.src = `data:image/png;base64,${data.screenshot}`;
                    } else {
                        screenshot.alt = "No screenshot captured.";
                    }
                } else {
                    terminal.innerHTML += `\n<span class="text-red-500 font-bold">[Error] Server returned status ${response.status}: ${data.error}</span>`;
                }

            } catch (err) {
                terminal.innerHTML += `\n<span class="text-red-500 font-bold">[Error] Connection failed: ${err.message}</span>`;
            } finally {
                runBtn.disabled = false;
                runBtn.classList.remove('opacity-50');
                statusDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
